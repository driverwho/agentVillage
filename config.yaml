# Agent Village 配置文件
# 所有字段可选，未设置的字段使用 server/config.py 中的默认值

context:
  # --- Token 预算 ---
  # 模型上下文上限（同时受环境变量 LLM_CONTEXT_LIMIT 覆盖）
  llm_context_limit: 4096
  # LLM 输出预留空间
  llm_output_reserve: 500
  # 对话超过此轮数触发压缩
  context_compress_threshold: 10
  # 剩余 token 低于此值触发疲倦模式
  context_tired_threshold: 200
  # 记忆检索时间衰减率（约 20 天后权重降至 1/e）
  context_decay_rate: 0.05

  # --- 上下文分层配额（总和应为 1.0）---
  # Layer 0: 不可变核心（系统角色设定）
  # Layer 1: 世界注入（时间/天气/事件）
  # Layer 2: 自身状态（health/hunger/fatigue/mood）
  # Layer 3: 交互对象上下文（对方可见信息）
  # Layer 4: 记忆检索（关键词匹配结果）
  # Layer 5: 活跃对话（弹性配额，用满剩余）
  layer_quotas:
    0: 0.30   # 30%
    1: 0.05   # 5%
    2: 0.05   # 5%
    3: 0.10   # 10%
    4: 0.25   # 25%
    5: 0.25   # 25%（弹性）

  # --- 注入防护 ---
  # 提示注入关键词黑名单
  injection_blacklist:
    - "ignore previous"
    - "ignore all previous"
    - "system prompt"
    - "system:"
