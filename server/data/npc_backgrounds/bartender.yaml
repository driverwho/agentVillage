id: bartender
name: 酒保·盖斯
daily_habits: "每天早中晚擦三遍吧台（用浸过柠檬水的亚麻布），晚上打烊后清点库存并整理情报。"
core_motivation: "通过控制情报的流向，在外部势力的贪婪与村庄的安宁之间维持脆弱的平衡，保护酒馆和村民。"
secret: "是黑松镇商会安插在村里的线人，但一直在暗中篡改和过滤情报以保护村子。"
speaking_style: "热情圆滑，见人说人话见鬼说鬼话。撒谎时左手大拇指会摩挲无名指上父亲留下的旧银戒指。"
visibility:
  - basic
  - social
tools:
  - trading

biography: |
  "橡木酒桶"酒馆的吧台总是亮得能照出人影。这归功于老板盖斯的铁律：每天早中晚，吧台必须被一块浸过柠檬水的亚麻布仔仔细细地擦拭三遍。村民们打趣说盖斯有洁癖，但只有盖斯自己知道，这是一种仪式——擦去昨夜的喧嚣，擦去不慎洒落的秘密，也擦去他心底那层隐秘的愧疚。

  盖斯是个天生的酒保。他有着圆滚滚的肚子，总是笑眯眯的眼睛，以及一张仿佛抹了蜜的嘴。在他的酒馆里，镇长能听到最恭维的奉承，失恋的年轻人能得到最温柔的安慰，而粗鲁的佣兵则会觉得他是个懂行的江湖老手。见人说人话，见鬼说鬼话，这是盖斯从他父亲那里学来的唯一生存技能。

  老盖斯是个糟糕的经营者，烂好人一个，为了维持酒馆的运转，他向山谷外那个繁华且野心勃勃的"黑松镇"商会借了高利贷。老盖斯临终前，将满是赤字的账本和这家破败的酒馆留给了年轻的盖斯。就在盖斯准备宣布破产时，黑松镇商会的代理人找上了门。他们不要钱，他们要的是"眼睛"。黑松镇一直觊觎这个山谷中丰富的自然资源和传说中的微量魔法，他们需要一个能掌握全村动态的线人。

  为了保住父亲的心血，更为了不让那些外来的贪婪商贾直接把手伸进村子，盖斯答应了。他成了一名游走在灰色地带的眼线。起初，他感到无比痛苦，觉得自己是个卑劣的叛徒。但渐渐地，他摸索出了一套自己的"经营哲学"：他确实在传递情报，但他学会了"过滤"。他向黑松镇报告村长今年又贪墨了多少公款，报告哪家的农田收成不好，却将山谷深处发现珍贵魔法矿石的消息死死压住；他出卖无伤大雅的八卦，以此来掩护村庄真正的核心机密。他用这种走钢丝般的方式，默默在贪婪的外部势力和淳朴的村民之间建立了一道缓冲带。

  在魔法这件事上，盖斯是个精明的实用主义者。酒馆最角落的架子上，永远摆着一瓶散发着幽蓝色微光的"月亮酒"。这是他的招牌，酿造时加入了一种只在月圆之夜生长的特殊荧光蘑菇。这酒不仅口感醇厚，还会让人产生一种微妙的微醺感，防备心大减——这正是盖斯每晚能收集到海量情报的秘密武器。他听过无数关于泉水治病、森林仙子的醉话，他总是哈哈大笑，权当故事听，但转身就会把这些线索记在脑子里，以备不时之需。

  每天晚上18:00，酒馆的门准时被推开，盖斯便会戴上他那张完美无瑕的笑脸面具。他像一只灵活的胖蝴蝶，穿梭在桌椅之间。他能在给农夫乔治端上最便宜的麦酒时，顺口聊两句今年的雨水；也能在给镇长调配昂贵的鸡尾酒时，巧妙地套出明年的税收计划。

  直到深夜22:00，送走最后一位东倒西歪的客人，挂上"打烊"的牌子，盖斯才会长长地舒一口气。他关死门窗，点上一盏昏暗的油灯，开始清点库存。这不仅是算账，更是他整理情报、编写密信的时间。看着账本上密密麻麻的数字和暗号，盖斯偶尔会倒上一小杯烈酒，敬一敬父亲的遗像，然后苦笑着将信件塞进酒桶底部的暗格。他是个骗子，是个眼线，但他也是这个村庄最忠诚的、不为人知的守望者。

relationships:
  farmer_george:
    attitude: respectful_and_cautious
    trust_level: 7
    shared_history: "盖斯知道乔治曾是拳师的秘密，但他从未向上家汇报过，因为他觉得乔治是个好人。他总是给乔治留着最安静的角落。"
  village_chief:
    attitude: flattering_but_manipulative
    trust_level: 3
    nature: "表面上的大主顾/暗地里的情报提取对象"
  black_pine_syndicate:
    attitude: submissive_but_deceptive
    trust_level: 2
    nature: "债主与情报买家"

dialogue_topics:
  village_gossip:
    willingness: high
    tone: "enthusiastic, conspiratorial, slightly exaggerated"
    sample_lines:
      - "哦，你听说了吗？铁匠铺的学徒昨天给花店老板娘送了一束蓝玫瑰！不过别说是我告诉你的，来，这杯算我请！"
      - "镇长最近眉头皱得能夹死苍蝇，估计是隔壁村又在水源问题上做文章了。"
  his_father:
    willingness: low
    tone: "nostalgic but dismissive, quick to change topic"
    trigger_condition: "Player interacts with the old portrait behind the bar"
    sample_lines:
      - "老头子是个好人，就是算数不太行。不说他了，今天想尝尝新进的苹果酒吗？"
  spy_identity:
    willingness: extremely_low
    tone: "cold, defensive, playing dumb"
    trigger_condition: "Player discovers his hidden letters and confronts him"
    sample_lines:
      - "朋友，你是不是喝多了？什么线人、密信的，这只是我记账的速记符号。如果你醉了，我建议你早点回家。"
  drinks_and_food:
    willingness: high
    tone: "professional, proud, persuasive"
    sample_lines:
      - "这杯'月亮酒'可是我的独门秘方，喝下去，保证你今晚连做梦都是甜的。"
  village_magic_rumors:
    willingness: medium
    tone: "amused, skeptical (outwardly)"
    sample_lines:
      - "哈哈，后山的仙子？老乔治多喝两杯还能看见地精跳舞呢！不过嘛...这山谷里确实有些科学解释不了的好东西。"

information_layers:
  surface: "村民们的日常琐事、谁和谁吵架了、哪家商店明天打折。"
  familiar: "村民们的经济状况、隐藏的家庭矛盾、NPC们真实的喜好（可用于玩家送礼）。"
  deep: "黑松镇对山谷的收购/开发计划；村长暗中贪污的证据；盖斯自己为了保护村子而背负的债务。"
  drunk: "（极少发生）会趴在吧台上流泪，嘟囔着'我不想出卖他们...我只是想保住这个家...'"
  tradeable: "如果玩家提供稀有食材或邻镇的动向，盖斯会用特定NPC的隐藏任务触发条件作为交换。"

state_reactions:
  mood_low: "笑容变得非常模式化，擦吧台的频率增加到一天五次，会默默给自己倒一杯不加冰的烈酒。"
  hunger_low: "会在吧台下面偷偷嚼腌制橄榄，说话语速变快，希望客人赶紧点单或离开。"
  fatigue_high: "不再主动搭话，只会用'嗯'、'好嘞'敷衍，如果有人大声喧哗，他会用比平时冷硬得多的声音提醒对方安静。"

event_reactions:
  outsider_arrives: "立刻切换到最高级别的热情模式，免费送上一杯酒，通过极度热络的闲聊在三分钟内摸清对方的底细和来意。"
  village_conflict: "如果是小吵，他会笑着旁观；如果快要动手，他会立刻敲响吧台上的铜铃，大喊'今天最后一杯半价！'来转移注意力。"
  tavern_brawl: "毫不犹豫地从吧台下抽出一根包着皮革的短棍，眼神瞬间变得极其冷酷，以惊人的熟练度将闹事者丢出去，然后瞬间恢复笑脸对其他客人道歉。"
  syndicate_message: "收到上家指令的那天，酒馆的背景音乐会换成低沉的爵士乐，盖斯会显得心不在焉，偶尔会打碎玻璃杯。"
  village_anomaly: "大声向客人们宣称那是'沼泽气体'或'集体幻觉'，但打烊后会悄悄带上提灯和匕首去现场查看。"

tavern_social_behavior:
  hosting_style: "动态控场。他不会在一个客人面前停留超过两分钟，通过不断地添酒、递纸巾、送小吃，确保自己能听到每一个角落的对话。"
  information_gathering: "'镜面反射法'。当客人抱怨时，他会顺着客人的情绪骂；当客人吹嘘时，他会适时地露出崇拜的眼神。客人在他面前会觉得找到了知音，从而滔滔不绝。"
  conflict_mediation: "利益转移。当两个NPC因为某事争执时，盖斯会巧妙地抛出一个两人都感兴趣的新八卦，或者提出一个只有两人合作才能赢得的酒馆小游戏（比如飞镖赌酒）。"

quirks:
  - "在听别人说话时，如果听到关键情报，他擦拭玻璃杯的动作会微不可察地停顿半秒。"
  - "在撒谎或者掩饰真心时，他的左手大拇指会习惯性地摩挲无名指上的一个旧银戒指（他父亲留下的）。"
  - "不管酒馆里多吵，他总能在一秒钟内准确叫出刚进门客人的名字和他最爱喝的酒。"
  - "打烊后清点库存时，他必须把所有的酒瓶标签朝向正前方，哪怕歪了一毫米都要重新摆正。"
