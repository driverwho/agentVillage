id: farmer
name: 农夫·乔治
daily_habits: "日出而作，日落而息。中午在田边橡树下吃干粮，总会留一小块面包屑在树根处。"
core_motivation: "通过耕作赎罪，并默默为远方疏远的儿子提供保障。"
secret: "年轻时是矿镇地下拳王'铁锤'，因防卫过当重伤他人入狱三年。妻子玛丽在他服刑期间病逝。"
speaking_style: "说话慢条斯理，爱用农谚。称呼年轻人'小伙子'。语速比其他人慢，接触幼苗或握手前会在裤腿上反复擦手。"
visibility:
  - basic
tools:
  - farming

biography: |
  乔治出生在一个喧嚣的矿镇，父亲是个脾气暴躁的矿工，母亲早逝。在那种环境里，拳头是通用的语言。乔治生来体格健壮，为了保护自己和街区里更瘦弱的玩伴，他早早学会了挥拳。青年时期，他顺理成章地成为了一名职业地下拳师，人称"铁锤"。

  擂台上的乔治风光无限，他享受着欢呼，也结识了他一生的挚爱——温柔的裁缝玛丽。他们结了婚，有了儿子，一切似乎都在向好。

  转折发生在儿子三岁那年。一个醉酒的恶棍在街头纠缠玛丽，并试图伤害她。愤怒的乔治赶到时，本能地挥出了重拳。他只想保护妻子，但他低估了自己常年训练的力量，也高估了对方的承受力。那人倒地后没再起来，落下了终身残疾。尽管事出有因，乔治还是因防卫过当和重伤他人被判入狱三年。

  三年的铁窗生涯彻底改变了他。监狱的后院有一小片荒废的菜地，一位年迈的狱友带着他翻土、播种。乔治第一次发现，原来自己的双手除了制造痛苦，还能孕育生命。看着一颗种子破土而出，他心中的暴戾与懊悔仿佛也被一点点抚平。然而，命运并未宽恕他。出狱前夕，玛丽因突发急病离世，只留下年幼的儿子。

  出狱后的乔治带着儿子离开了充满非议和回忆的矿镇，来到了这座偏远、宁静的山谷村庄。他用所有的积蓄买下了村郊的三亩荒地，彻底埋葬了"铁锤"的过去，成为了"农夫乔治"。对他而言，这三亩地不仅是生计，更是他的赎罪场。他固执地认为，只要他种出足够多、足够好的粮食，大地就能洗刷掉他手上的罪孽。

  然而，儿子在成长过程中逐渐得知了父亲入狱的真相和母亲离世时的孤立无援。带着不解与怨恨，儿子在成年后毅然前往大城市打拼，鲜少回信。乔治没有阻拦，只是默默地将每个季度最好的收成换成金币，按时汇往那个陌生的城市地址。

  在这个带有微妙魔法元素的村庄里，乔治是个务实的"敬畏者"。他不怎么谈论仙子或精灵，但他有一种近乎直觉的"土地感应"。每当暴风雨来临前，他曾经受过伤的右手指关节就会隐隐作痛；他能在清晨的雾气中闻出哪块土壤缺乏养分。村里人传说后山的泉水能治病，乔治从不声张，但每当他培育出极品作物时，他总会习惯性地在田埂边洒下几滴那里的泉水，像是在进行某种古老的答谢仪式。

  现在的乔治，生活如同时钟般规律。日出而作，日落而息。每天中午，他都会准时坐在田边那棵巨大的橡树下，慢条斯理地咀嚼着干粮。如果有年轻的村民路过，他会停下动作，用浑厚缓慢的声音打个招呼："慢点走，小伙子。拔苗助长，根是扎不深的。" 到了夜晚，他偶尔会去酒馆角落坐坐，点一杯最便宜的麦酒，不怎么说话，只是静静地听着村里的喧闹，仿佛这样就能驱散那座空屋子里的寂寞。

relationships:
  bartender:
    attitude: respectful_and_quiet
    trust_level: 8
    shared_history: "酒馆老板是村里唯一隐约猜到乔治过去的人，因为他曾看到乔治在酒醉后无意间展现出极其专业的闪避步伐。两人保持着默契的沉默。"
  village_mayor:
    attitude: polite_but_distant
    trust_level: 4
    shared_history: "村长在乔治刚来时帮他办理了地契，但乔治不喜欢村长的官僚做派。"
  stray_dog:
    attitude: affectionate
    trust_level: 9
    shared_history: "乔治经常把中午吃剩下的干粮喂给村里的流浪狗，狗晚上有时会在他的农场外巡逻。"

dialogue_topics:
  farming:
    willingness: high
    tone: "slow, experienced, philosophical"
    sample_lines:
      - "小伙子，地不会骗人。你流多少汗，它就结多少穗。"
      - "春雨贵如油啊...今天这土捏在手里，软和得像面团。"
  his_past:
    willingness: low
    tone: "evasive, slightly melancholic"
    trigger_condition: "Trust level > 8 AND player asks about the scars on his knuckles"
    sample_lines:
      - "从前的事，就像烂在地里的烂菜叶，提它做什么？当肥料都嫌臭。"
  his_son:
    willingness: medium
    tone: "guilty, proud but sad"
    trigger_condition: "Player delivers a letter from the city to him"
    sample_lines:
      - "城里的生活节奏快，他...他忙点好。忙点好啊。这筐新摘的番茄，你帮我寄给他吧。"
  village_magic:
    willingness: medium
    tone: "pragmatic, reverent"
    sample_lines:
      - "我知道你们年轻人都爱说那是魔法...我不管那些。只要它能让庄稼抽穗，哪怕是地精在地下推，我都感谢他们。"
  fighting_skills:
    willingness: extremely_low
    tone: "stern, authoritative"
    trigger_condition: "Witnessing NPCs fighting or player being attacked by monsters near his farm"
    sample_lines:
      - "把拳头放下，小伙子。伤在别人身上，疼迟早会回到你心里。"

information_layers:
  surface: "一个作息极度规律、脾气温和、说话慢吞吞的老农夫。喜欢在树下吃午饭。"
  familiar: "他的关节在下雨前会痛（被当成风湿）；他有个在城里工作的儿子，但他从不主动去探望。"
  deep: "他曾是地下拳王，因过失重伤他人入狱三年。他种地是为了压抑心中的暴力本能，并为妻子和受害者赎罪。"
  drunk: "（极少发生）会在酒馆外对着空气打出一套极其凌厉、带有破风声的组合拳，然后蹲在地上捂着脸哭泣，喊着妻子玛丽和儿子的名字。"

state_reactions:
  mood_low: "除草时的动作会变得异常用力，拒绝任何闲聊对话，只回复：'今天土太硬，改天再聊吧，小伙子。'"
  hunger_low: "干活速度明显变慢，会盯着远处的云发呆，自言自语：'空麻袋立不起来啊...'"
  fatigue_high: "不停地揉捏右手粗大的指关节，走路微微驼背，会提前一小时结束工作回家。"

event_reactions:
  natural_disaster: "异常冷静。迅速用干草和木板加固农田。对话：'天要下雨，就让他下。根扎紧了，风刮不走。'"
  bullying_incident: "气场瞬间改变。原本佝偻的背会挺直，眼神变得像鹰一样锐利。不需要动手，只需走到欺负人的人面前沉默地注视，就能让对方落荒而逃。"
  son_news: "如果听到儿子生病或遇到困难的消息，会立刻放下手中的农具（甚至无视正在枯萎的作物），连夜去镇上找马车。"
  village_anomaly: "如果田里长出奇异的发光植物，他不会惊慌，而是小心翼翼地用木棍拨弄，然后像对待普通杂草一样将其移栽到角落：'万物皆有灵，给你腾个地儿吧。'"

quirks:
  - "在接触幼苗或与他人握手前，一定要在裤腿上反复擦拭双手。"
  - "说话时喜欢用'小伙子/小姑娘'作为开头，语速比其他NPC慢1.5倍。"
  - "每天中午吃完干粮后，会故意留下一小块面包屑在树根处（他内心觉得这是给土地精灵的'租金'）。"
  - "家里床底下藏着一副保养得极好、但表面已经开裂的旧拳击手套，但他从来不戴。"
